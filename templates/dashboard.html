<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEX Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding: 16px;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            font-size: 1.4rem;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }

        #last-update {
            text-align: center;
            color: #555;
            font-size: 0.75rem;
            margin-bottom: 20px;
        }

        .section-label {
            color: #333;
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin: 20px 0 10px;
            border-bottom: 1px solid #1a1a2a;
            padding-bottom: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 14px;
        }

        .chart-div {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .chart-div:hover { border-color: #333355; }

        .chart-div-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .chart-title { font-size: 0.6rem; color: #444; letter-spacing: 2px; margin-bottom: 2px; }
        .symbol      { font-size: 1.1rem; font-weight: bold; color: #fff; letter-spacing: 2px; }
        .spot        { font-size: 0.95rem; color: #00d4ff; }

        .regime { font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; font-weight: bold; letter-spacing: 1px; }
        .regime.POSITIVE { background: #0d2b1a; color: #00ff88; border: 1px solid #00ff88; }
        .regime.NEGATIVE { background: #2b0d0d; color: #ff4444; border: 1px solid #ff4444; }

        .total-gex { font-size: 0.7rem; color: #888; margin-top: 4px; }
        .total-gex span { color: #00d4ff; }

        .levels { display: flex; gap: 10px; margin-bottom: 8px; font-size: 0.68rem; flex-wrap: wrap; }
        .level-item { color: #555; }
        .level-item span { color: #bbb; font-weight: bold; }

        /* Chart containers — LW Charts fills these divs via autoSize */
        .chart-container {
            height: 260px;
            width: 100%;
            position: relative;
        }

        /* ── Timeframe buttons ── */
        .tf-buttons {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            justify-content: flex-end;
        }

        .tf-btn {
            background: none;
            border: 1px solid #222233;
            color: #444;
            font-family: 'Courier New', monospace;
            font-size: 0.58rem;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: border-color 0.1s, color 0.1s;
            user-select: none;
        }

        .tf-btn:hover { border-color: #444; color: #888; }
        .tf-btn.active { border-color: #00d4ff; color: #00d4ff; }

        /* ── Flow feed ── */
        #flow-feed {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 20px;
            max-height: 320px;
            overflow-y: auto;
        }

        #flow-feed:empty::after {
            content: 'Waiting for flow alerts — monitoring call wall strikes...';
            color: #333;
            font-size: 0.7rem;
            padding: 10px 0;
            letter-spacing: 1px;
        }

        .flow-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 6px;
            padding: 7px 12px;
            font-size: 0.72rem;
            animation: flowIn 0.2s ease;
        }

        @keyframes flowIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .flow-row.call  { border-left: 3px solid #00ff88; }
        .flow-row.put   { border-left: 3px solid #ff4444; }

        .flow-time  { color: #444; min-width: 52px; }
        .flow-sym   { color: #fff; font-weight: bold; min-width: 38px; letter-spacing: 1px; }
        .flow-strike { color: #00d4ff; min-width: 54px; }
        .flow-side  { font-weight: bold; min-width: 36px; }
        .flow-side.call { color: #00ff88; }
        .flow-side.put  { color: #ff4444; }

        .flow-badge {
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 3px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .flow-badge.dte0  { background: #1a0a2a; color: #cc88ff; border: 1px solid #cc88ff; }
        .flow-badge.multi { background: #0a1a1a; color: #448888; border: 1px solid #448888; }

        .flow-vol   { color: #bbb; min-width: 80px; }
        .flow-dir   { font-weight: bold; min-width: 38px; letter-spacing: 1px; }
        .flow-dir.BUY  { color: #00ff88; }
        .flow-dir.SELL { color: #ff4444; }
        .flow-price { color: #555; font-size: 0.68rem; }
        .flow-score { color: #333; font-size: 0.65rem; margin-left: auto; }

        /* ── Modal ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        #modal-overlay.open { display: flex; }

        #modal-box {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        #modal-close {
            position: absolute;
            top: 12px; right: 16px;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Courier New', monospace;
        }

        #modal-close:hover { color: #fff; }

        #modal-chart-container {
            height: 560px;
            width: 100%;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <h1>⬡ GEX DASHBOARD</h1>
    <div id="last-update">Initializing... <span id="stream-dot" title="Streaming status" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#333;margin-left:6px;vertical-align:middle;"></span></div>

    <div class="section-label">GAMMA EXPOSURE</div>
    <div class="grid" id="gex-grid"></div>

    <div class="section-label">PRICE · ET</div>
    <div class="grid" id="price-grid"></div>

    <div class="section-label">OPTIONS FLOW</div>
    <div id="flow-feed"></div>

    <!-- Expand modal -->
    <div id="modal-overlay">
        <div id="modal-box">
            <button id="modal-close">✕ close</button>
            <div id="modal-header"></div>
            <div id="modal-chart-container"></div>
        </div>
    </div>

    <script>
        const LWC = window.LightweightCharts;

        const GEX_SYMBOLS    = ['SPX', 'SPY', 'QQQ'];
        const PRICE_SYMBOLS  = ['SPY', 'QQQ', 'SPX', 'ES'];
        // Streamed symbols get live updates via SSE; poll them infrequently as a fallback.
        // Non-streamed symbols (SPX) still depend on the 30s GEX poll for price.
        const STREAM_SYMBOLS = new Set(['SPY', 'QQQ', 'ES']);  // match streamer.py
        const GEX_REFRESH_MS   = 30000;   // GEX: 30 s
        const PRICE_REFRESH_MS = 300000;  // Price: 5 min (streaming covers live updates)

        const gexCharts   = {};   // key (symbol-slot) -> { chart, series, chartData, spot }
        const priceCharts = {};   // symbol -> { chart, candleSeries, volumeSeries }
        const rawCandles  = {};   // symbol -> array of raw 1m candles (source of truth)
        const selectedTF  = {};   // symbol -> timeframe in minutes (default 1)
        let   modalLWChart = null;

        // ── Timezone helper (LW Charts is UTC-only — shift timestamps to ET) ──

        function fmtET24(utcSecs) {
            return new Date(utcSecs * 1000).toLocaleTimeString('en-US', {
                timeZone: 'America/New_York',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
            });
        }

        function fmtETDate(utcSecs) {
            return new Date(utcSecs * 1000).toLocaleDateString('en-US', {
                timeZone: 'America/New_York',
                month: 'short',
                day: 'numeric',
            });
        }

        // ── Formatters ──────────────────────────────────────────────────────

        const fmt    = n => (n == null) ? '—' : n.toLocaleString('en-US', { maximumFractionDigits: 2 });
        const fmtGex = n => {
            if (n == null) return '—';
            const b = n / 1e9;
            return (b >= 0 ? '+' : '') + b.toFixed(2) + 'B';
        };

        // ── Candle aggregation (client-side timeframe resampling) ────────────

        /**
         * Aggregate an array of 1m candles into larger timeframe bars.
         * candles must be sorted ascending by .time (Unix seconds).
         * minutes: 1, 5, 15, 30, 60
         */
        function aggregateCandles(candles, minutes) {
            if (minutes === 1 || !candles.length) return candles;
            const bucket = minutes * 60;   // seconds per bar
            const groups = {};

            for (const c of candles) {
                const key = Math.floor(c.time / bucket) * bucket;
                if (!groups[key]) {
                    groups[key] = {
                        time:   key,
                        open:   c.open,
                        high:   c.high,
                        low:    c.low,
                        close:  c.close,
                        volume: c.volume || 0,
                    };
                } else {
                    const g = groups[key];
                    g.high   = Math.max(g.high, c.high);
                    g.low    = Math.min(g.low,  c.low);
                    g.close  = c.close;
                    g.volume = (g.volume || 0) + (c.volume || 0);
                }
            }

            return Object.values(groups).sort((a, b) => a.time - b.time);
        }

        // ── Chart factory ────────────────────────────────────────────────────

        const DARK_BASE = {
            layout: {
                background: { type: 'solid', color: '#12121a' },
                textColor: '#555',
                fontFamily: "'Courier New', monospace",
                fontSize: 10,
            },
            grid: {
                vertLines: { color: '#1a1a2a' },
                horzLines: { color: '#1a1a2a' },
            },
            crosshair: { mode: LWC.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#1e1e2e' },
            handleScroll: true,
            handleScale: true,
        };

        function makePriceChart(container) {
            return LWC.createChart(container, {
                ...DARK_BASE,
                autoSize: true,
                localization: {
                    timeFormatter: fmtET24,   // crosshair tooltip — 24-hr ET
                },
                timeScale: {
                    borderColor: '#1e1e2e',
                    timeVisible: true,
                    secondsVisible: false,
                    fixLeftEdge: false,
                    fixRightEdge: false,
                    tickMarkFormatter: (utcSecs, tickMarkType) =>
                        tickMarkType <= 2 ? fmtETDate(utcSecs) : fmtET24(utcSecs),
                },
            });
        }

        // ── DOM builders ─────────────────────────────────────────────────────

        function createGexDiv(symbol, slot) {
            const id    = `${symbol}-${slot}`;
            const label = slot === 'zero' ? '0DTE' : 'ALL EXPIRATIONS';
            const div   = document.createElement('div');
            div.className = 'chart-div';
            div.id = `gex-div-${id}`;
            if (slot === 'zero') div.style.display = 'none';  // hidden until market hours confirm 0DTE data
            div.innerHTML = `
                <div class="chart-div-header">
                    <div>
                        <div class="chart-title">GEX · ${label}<span id="odte-date-${id}" style="margin-left:6px;color:#555;font-size:0.6rem;letter-spacing:1px;"></span></div>
                        <div class="symbol">${symbol}</div>
                        <div class="spot" id="spot-${id}">Loading...</div>
                    </div>
                    <div style="text-align:right">
                        <div class="regime" id="regime-${id}">—</div>
                        <div class="total-gex">GEX: <span id="gex-${id}">—</span></div>
                    </div>
                </div>
                <div class="levels">
                    <div class="level-item">Flip: <span id="flip-${id}">—</span></div>
                    <div class="level-item">Put Wall: <span id="put-${id}">—</span></div>
                    <div class="level-item">Call Wall: <span id="call-${id}">—</span></div>
                    <div class="level-item">Pin: <span id="pin-${id}">—</span></div>
                </div>
                <div class="chart-container"><canvas id="gex-canvas-${id}"></canvas></div>
            `;
            div.addEventListener('dblclick', () => expandGex(symbol, slot));
            return div;
        }

        function createPriceDiv(symbol) {
            const div = document.createElement('div');
            div.className = 'chart-div';
            div.id = `price-div-${symbol}`;
            div.innerHTML = `
                <div class="chart-div-header">
                    <div>
                        <div class="chart-title">PRICE</div>
                        <div class="symbol">${symbol}</div>
                        <div class="spot" id="price-spot-${symbol}">—</div>
                    </div>
                    <div>
                        <div class="tf-buttons" id="tf-btns-${symbol}">
                            <button class="tf-btn active" data-tf="1">1m</button>
                            <button class="tf-btn" data-tf="5">5m</button>
                            <button class="tf-btn" data-tf="15">15m</button>
                            <button class="tf-btn" data-tf="30">30m</button>
                            <button class="tf-btn" data-tf="60">1h</button>
                        </div>
                    </div>
                </div>
                <div class="chart-container" id="price-canvas-${symbol}"></div>
            `;
            // Wire up TF buttons — stopPropagation so dblclick on a button doesn't open modal
            div.querySelectorAll('.tf-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const tf = parseInt(btn.dataset.tf);
                    div.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    setTimeframe(symbol, tf);
                });
            });
            div.addEventListener('dblclick', () => expandPrice(symbol));
            return div;
        }

        // ── GEX chart (Chart.js — horizontal bars, strikes on Y axis) ────────────

        const spotLinePlugin = {
            id: 'spotLine',
            afterDraw(chart) {
                const { ctx, scales } = chart;
                if (!chart._spotPrice || !scales.y) return;
                const spot  = chart._spotPrice;
                const spotY = scales.y.getPixelForValue(spot);
                if (spotY < scales.y.top || spotY > scales.y.bottom) return;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(scales.x.left, spotY);
                ctx.lineTo(scales.x.right, spotY);
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth   = chart._forModal ? 2 : 1.5;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.fillStyle = '#00d4ff';
                ctx.font = `${chart._forModal ? 12 : 10}px Courier New`;
                ctx.fillText(spot.toLocaleString(), scales.x.right - 70, spotY - 5);
                ctx.restore();
            }
        };
        Chart.register(spotLinePlugin);

        function makeGexChartConfig(chartData, spot, forModal = false) {
            const { strikes, net_gex } = chartData;
            const colors = net_gex.map(v => v >= 0 ? 'rgba(0,255,136,0.7)' : 'rgba(255,68,68,0.7)');
            return {
                type: 'bar',
                data: {
                    labels: strikes,
                    datasets: [{ data: net_gex, backgroundColor: colors, borderWidth: 0, barThickness: 'flex' }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend:  { display: false },
                        tooltip: { callbacks: { label: c => `GEX: ${fmtGex(c.raw)}` } },
                    },
                    scales: {
                        x: {
                            grid:  { color: '#1e1e2e' },
                            ticks: { color: '#555', font: { size: forModal ? 11 : 9 } },
                        },
                        y: {
                            reverse: true,
                            grid:    { color: '#1e1e2e' },
                            ticks: {
                                color:    '#888',
                                font:     { size: forModal ? 11 : 9, family: 'Courier New' },
                                callback: (v, i) => strikes[i],
                            },
                        },
                    },
                },
                plugins: [],   // spotLinePlugin registered globally via Chart.register
            };
        }

        function renderGexChart(symbol, slot, chartData, spot) {
            const key    = `${symbol}-${slot}`;
            const canvas = document.getElementById(`gex-canvas-${key}`);
            if (!canvas || !chartData.strikes.length) return;

            if (gexCharts[key]) { gexCharts[key].destroy(); delete gexCharts[key]; }

            const config    = makeGexChartConfig(chartData, spot);
            const chartInst = new Chart(canvas.getContext('2d'), config);
            chartInst._spotPrice = spot;
            gexCharts[key]       = chartInst;
            gexCharts[key]._gexData = { ...chartData, spot };
        }

        function updateGexSlot(symbol, slot, chartData, levels, spot, totalGex, regime) {
            const id = `${symbol}-${slot}`;
            document.getElementById(`spot-${id}`).textContent  = fmt(spot);
            document.getElementById(`gex-${id}`).textContent   = fmtGex(totalGex);
            document.getElementById(`flip-${id}`).textContent  = fmt(levels.flip_level);
            document.getElementById(`put-${id}`).textContent   = fmt(levels.put_wall);
            document.getElementById(`call-${id}`).textContent  = fmt(levels.call_wall);
            document.getElementById(`pin-${id}`).textContent   = fmt(levels.pin);
            const r = document.getElementById(`regime-${id}`);
            r.textContent = regime;
            r.className   = `regime ${regime}`;
            renderGexChart(symbol, slot, chartData, spot);
        }

        // Format "2026-05-22" → "05/22/2026"
        function fmtOdteDate(iso) {
            if (!iso) return '';
            const [y, m, d] = iso.split('-');
            return `${m}/${d}/${y}`;
        }

        function updateGexDiv(symbol, data) {
            const multiTotal = data.multi.net_gex.reduce((a, b) => a + b, 0);
            const zeroTotal  = data.zero.net_gex.reduce((a, b) => a + b, 0);

            updateGexSlot(symbol, 'multi', data.multi, data.levels_multi, data.spot,
                          multiTotal, multiTotal >= 0 ? 'POSITIVE' : 'NEGATIVE');

            const zeroDiv  = document.getElementById(`gex-div-${symbol}-zero`);
            const dateEl   = document.getElementById(`odte-date-${symbol}-zero`);

            if (data.has_0dte) {
                if (zeroDiv) zeroDiv.style.display = '';
                // Stamp the 0DTE expiry date into the title
                if (dateEl && data.odte_date) {
                    dateEl.textContent = `· ${fmtOdteDate(data.odte_date)}`;
                }
                updateGexSlot(symbol, 'zero', data.zero, data.levels_0dte, data.spot,
                              zeroTotal, zeroTotal >= 0 ? 'POSITIVE' : 'NEGATIVE');
            } else {
                if (zeroDiv) zeroDiv.style.display = 'none';
            }
        }

        // ── Price chart (LW Charts — candles + volume) ────────────────────────

        /**
         * Build candlestick + volume series on an existing LW chart.
         * Returns { candleSeries, volumeSeries }.
         * candles: array of { time, open, high, low, close, volume }
         */
        function buildCandleSeries(chart, candles) {
            // Candlestick series (primary pane)
            const candleSeries = chart.addSeries(LWC.CandlestickSeries, {
                upColor:      '#00ff88',
                downColor:    '#ff4444',
                borderVisible: false,
                wickUpColor:   '#00ff88',
                wickDownColor: '#ff4444',
            });

            // Volume histogram — overlaid in same pane, pushed to bottom 15% via scaleMargins
            const volumeSeries = chart.addSeries(LWC.HistogramSeries, {
                priceFormat:       { type: 'volume' },
                priceScaleId:      'volume',
                lastValueVisible:  false,
                priceLineVisible:  false,
            });
            chart.priceScale('volume').applyOptions({
                scaleMargins: { top: 0.85, bottom: 0 },
                visible: false,
            });

            _setSeriesData(candleSeries, volumeSeries, candles);
            chart.timeScale().fitContent();
            return { candleSeries, volumeSeries };
        }

        /** Push a full candle array into an existing candleSeries + volumeSeries pair. */
        function _setSeriesData(candleSeries, volumeSeries, candles) {
            candleSeries.setData(candles.map(c => ({
                time:  c.time,
                open:  c.open,
                high:  c.high,
                low:   c.low,
                close: c.close,
            })));
            volumeSeries.setData(candles.map(c => ({
                time:  c.time,
                value: c.volume || 0,
                color: c.close >= c.open ? 'rgba(0,255,136,0.25)' : 'rgba(255,68,68,0.25)',
            })));
        }

        function renderPriceChart(symbol, candles) {
            if (!candles.length) return;

            // Merge with any live SSE candles newer than the REST payload
            const prevRaw    = rawCandles[symbol] || [];
            const lastRestTs = candles[candles.length - 1].time;
            const liveExtra  = prevRaw.filter(c => c.time > lastRestTs);
            rawCandles[symbol] = [...candles, ...liveExtra];

            if (!selectedTF[symbol]) selectedTF[symbol] = 1;

            const display   = aggregateCandles(rawCandles[symbol], selectedTF[symbol]);
            const container = document.getElementById(`price-canvas-${symbol}`);
            if (!container || !display.length) return;

            if (priceCharts[symbol]) {
                // Chart already exists — replace data in place
                const entry = priceCharts[symbol];
                _setSeriesData(entry.candleSeries, entry.volumeSeries, display);
                entry.chart.timeScale().scrollToRealTime();
            } else {
                // First render — create chart from scratch
                container.innerHTML = '';
                const chart = makePriceChart(container);
                const { candleSeries, volumeSeries } = buildCandleSeries(chart, display);
                priceCharts[symbol] = { chart, candleSeries, volumeSeries };
            }

            const last = rawCandles[symbol][rawCandles[symbol].length - 1];
            if (last) {
                document.getElementById(`price-spot-${symbol}`).textContent = last.close.toFixed(2);
            }
        }

        /**
         * Switch a symbol's displayed timeframe and re-render from raw 1m data.
         * Called when user clicks a TF button.
         */
        function setTimeframe(symbol, minutes) {
            selectedTF[symbol] = minutes;
            const raw = rawCandles[symbol];
            if (!raw || !raw.length) return;

            const display = aggregateCandles(raw, minutes);
            const entry   = priceCharts[symbol];
            if (!entry) return;

            _setSeriesData(entry.candleSeries, entry.volumeSeries, display);
            entry.chart.timeScale().fitContent();
        }

        // ── Streaming ─────────────────────────────────────────────────────────

        function setStreamDot(color, title) {
            const dot = document.getElementById('stream-dot');
            if (dot) { dot.style.background = color; dot.title = title; }
        }

        function updatePriceCandle(symbol, candle) {
            // candle: { symbol, time (sec), open, high, low, close, volume }
            const entry = priceCharts[symbol];
            if (!entry) return;   // chart not yet loaded — polling will catch it

            // Update raw 1m store
            if (!rawCandles[symbol]) rawCandles[symbol] = [];
            const raw  = rawCandles[symbol];
            const last = raw[raw.length - 1];
            if (last && last.time === candle.time) {
                raw[raw.length - 1] = { ...candle };
            } else if (!last || candle.time > last.time) {
                raw.push({ ...candle });
            }

            // Update spot display
            const el = document.getElementById(`price-spot-${symbol}`);
            if (el) el.textContent = candle.close.toFixed(2);

            // Re-aggregate the bucket that contains this candle for the active TF
            const tf         = selectedTF[symbol] || 1;
            const bucket     = tf * 60;
            const bucketTime = Math.floor(candle.time / bucket) * bucket;
            const subset     = raw.filter(c => Math.floor(c.time / bucket) * bucket === bucketTime);
            if (!subset.length) return;

            const agg = {
                time:   bucketTime,
                open:   subset[0].open,
                high:   Math.max(...subset.map(c => c.high)),
                low:    Math.min(...subset.map(c => c.low)),
                close:  subset[subset.length - 1].close,
                volume: subset.reduce((s, c) => s + (c.volume || 0), 0),
            };

            entry.candleSeries.update({
                time:  agg.time,
                open:  agg.open,
                high:  agg.high,
                low:   agg.low,
                close: agg.close,
            });
            entry.volumeSeries.update({
                time:  agg.time,
                value: agg.volume,
                color: agg.close >= agg.open ? 'rgba(0,255,136,0.25)' : 'rgba(255,68,68,0.25)',
            });
        }

        const MAX_FLOW_ROWS = 50;

        function addFlowAlert(a) {
            const feed    = document.getElementById('flow-feed');
            const isCall  = a.side === 'call';
            const badge   = a.is_0dte
                ? '<span class="flow-badge dte0">0DTE</span>'
                : '<span class="flow-badge multi">MULTI</span>';
            const price   = a.last > 0
                ? `@ $${a.last.toFixed(2)} (${a.bid.toFixed(2)} / ${a.ask.toFixed(2)})`
                : '';
            const score   = `w:${a.weighted_delta.toFixed(0)}`;

            const row = document.createElement('div');
            row.className = `flow-row ${a.side}`;
            row.innerHTML = `
                <span class="flow-time">${a.time}</span>
                <span class="flow-sym">${a.underlying}</span>
                <span class="flow-strike">${a.strike}</span>
                <span class="flow-side ${a.side}">${a.side.toUpperCase()}</span>
                ${badge}
                <span class="flow-vol">+${a.volume_delta.toLocaleString()} contracts</span>
                <span class="flow-dir ${a.direction}">${a.direction}</span>
                <span class="flow-price">${price}</span>
                <span class="flow-score">${score}</span>
            `;

            feed.insertBefore(row, feed.firstChild);

            // Keep feed trimmed to MAX_FLOW_ROWS
            while (feed.children.length > MAX_FLOW_ROWS) {
                feed.removeChild(feed.lastChild);
            }
        }

        function connectSSE() {
            const es = new EventSource('/api/stream');

            es.onopen = () => {
                console.log('[SSE] Connected to streamer');
                setStreamDot('#00ff88', 'Streaming: connected');
            };

            es.onmessage = (event) => {
                let msg;
                try { msg = JSON.parse(event.data); } catch { return; }

                if (msg.type === 'connected') {
                    setStreamDot('#00ff88', 'Streaming: live');
                    return;
                }
                if (msg.type === 'candle') {
                    updatePriceCandle(msg.symbol, msg);
                }
                if (msg.type === 'flow_alert') {
                    addFlowAlert(msg);
                }
            };

            es.onerror = () => {
                setStreamDot('#ff4444', 'Streaming: disconnected (auto-reconnecting)');
                // EventSource reconnects automatically — dot will go green again on reconnect
            };
        }

        // ── Modal expand ──────────────────────────────────────────────────────

        let modalCJSChart = null;   // Chart.js instance for GEX modal

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            if (modalLWChart)  { modalLWChart.remove();  modalLWChart  = null; }
            if (modalCJSChart) { modalCJSChart.destroy(); modalCJSChart = null; }
            document.getElementById('modal-chart-container').innerHTML = '';
        }

        function openModal(headerHTML) {
            closeModal();
            document.getElementById('modal-header').innerHTML = headerHTML;
            document.getElementById('modal-overlay').classList.add('open');
        }

        function expandGex(symbol, slot = 'multi') {
            const key   = `${symbol}-${slot}`;
            const entry = gexCharts[key];
            if (!entry || !entry._gexData) return;
            const label = slot === 'zero' ? '0DTE' : 'ALL EXPIRATIONS';
            openModal(`
                <div style="margin-bottom:8px">
                    <div style="font-size:0.65rem;color:#444;letter-spacing:2px">GAMMA EXPOSURE · ${label}</div>
                    <div style="font-size:1.4rem;color:#fff;font-weight:bold">${symbol}</div>
                    <div style="font-size:0.8rem;color:#555">Press ESC to close</div>
                </div>
            `);
            const container = document.getElementById('modal-chart-container');
            container.innerHTML = '<canvas id="modal-gex-canvas"></canvas>';
            const canvas    = document.getElementById('modal-gex-canvas');
            const { strikes, net_gex, spot } = entry._gexData;
            const config    = makeGexChartConfig({ strikes, net_gex }, spot, true);
            modalCJSChart   = new Chart(canvas.getContext('2d'), config);
            modalCJSChart._spotPrice = spot;
            modalCJSChart._forModal  = true;
        }

        function expandPrice(symbol) {
            const raw = rawCandles[symbol];
            if (!raw || !raw.length) return;

            const tf      = selectedTF[symbol] || 1;
            const display = aggregateCandles(raw, tf);
            const last    = display[display.length - 1];
            const tfLabel = tf === 60 ? '1H' : `${tf}M`;

            openModal(`
                <div style="margin-bottom:8px">
                    <div style="font-size:0.65rem;color:#444;letter-spacing:2px">PRICE · ${tfLabel} · ET</div>
                    <div style="font-size:1.4rem;color:#fff;font-weight:bold">${symbol}
                        <span style="font-size:1rem;color:#00d4ff">${last ? last.close.toFixed(2) : ''}</span>
                    </div>
                    <div style="font-size:0.8rem;color:#555">Press ESC to close</div>
                </div>
            `);
            const container = document.getElementById('modal-chart-container');
            modalLWChart = makePriceChart(container);
            buildCandleSeries(modalLWChart, display);
        }

        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-overlay')) closeModal();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ── Fetch & update ────────────────────────────────────────────────────

        async function fetchGex(symbol) {
            try {
                const res = await fetch(`/api/gex/${symbol}`);
                if (!res.ok) return;
                const data = await res.json();
                if (!data.error) updateGexDiv(symbol, data);
            } catch (e) { console.error(`GEX ${symbol}:`, e); }
        }

        async function fetchPrice(symbol) {
            try {
                const res = await fetch(`/api/price/${symbol}`);
                if (!res.ok) return;
                const candles = await res.json();
                renderPriceChart(symbol, candles);
            } catch (e) { console.error(`Price ${symbol}:`, e); }
        }

        async function fetchGexAll() {
            await Promise.all(GEX_SYMBOLS.map(fetchGex));
            document.getElementById('last-update').textContent =
                `GEX updated: ${new Date().toLocaleTimeString('en-US', { hour12: false, timeZone: 'America/New_York' })} ET`;
        }

        async function fetchPriceAll() {
            await Promise.all(PRICE_SYMBOLS.map(fetchPrice));
        }

        // ── Init ──────────────────────────────────────────────────────────────

        const gexGrid   = document.getElementById('gex-grid');
        const priceGrid = document.getElementById('price-grid');
        GEX_SYMBOLS.forEach(s => {
            gexGrid.appendChild(createGexDiv(s, 'multi'));
            gexGrid.appendChild(createGexDiv(s, 'zero'));
        });
        PRICE_SYMBOLS.forEach(s => {
            selectedTF[s] = 1;   // default to 1m
            priceGrid.appendChild(createPriceDiv(s));
        });

        // Initial full load
        fetchGexAll();
        fetchPriceAll();

        // GEX refreshes every 30 s; price every 5 min as streaming fallback
        setInterval(fetchGexAll,   GEX_REFRESH_MS);
        setInterval(fetchPriceAll, PRICE_REFRESH_MS);

        // Connect SSE for real-time candle updates
        connectSSE();
    </script>
</body>
</html>
